[global]
background = "#232A34"
foreground = "#ECEFF4"
frame_color = "#88C0D0"
separator_color = "#88C0D0"
corner_radius = 10
frame_width = 2
offset = 12x12
gap_size = 8
transparency = 0

[urgency_low]
background = "#2B303B"
foreground = "#D8DEE9"
frame_color = "#81A1C1"
highlight = "#81A1C1"

[urgency_normal]
background = "#2E3440"
foreground = "#ECEFF4"
frame_color = "#88C0D0"
highlight = "#88C0D0"

[urgency_critical]
background = "#3B4252"
foreground = "#ECEFF4"
frame_color = "#BF616A"
highlight = "#BF616A"
