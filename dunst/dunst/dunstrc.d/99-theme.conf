[global]
background = "#3B4252"
foreground = "#ECEFF4"
frame_color = "#88C0D0"
separator_color = "frame"
corner_radius = 10
frame_width = 2
offset = 12x12
gap_size = 8
transparency = 0

format = "<b>%s</b>\n<span size='smaller'>%a</span>\n%b"

icon_position = left
min_icon_size = 32
max_icon_size = 48
text_icon_padding = 10
icon_theme = "Papirus,Adwaita"
enable_recursive_icon_lookup = true
default_icon = "dialog-information"

[urgency_low]
background = "#2E3440"
foreground = "#D8DEE9"
frame_color = "#4C566A"
highlight = "#88C0D0"

[urgency_normal]
background = "#3B4252"
foreground = "#ECEFF4"
frame_color = "#F69D50"
highlight = "#F69D50"

[urgency_critical]
background = "#434C5E"
foreground = "#ECEFF4"
frame_color = "#BF616A"
highlight = "#BF616A"

[rule_firefox]
desktop_entry = "firefox"
new_icon = "firefox"

[rule_clipboard]
appname = "Clipboard"
new_icon = "edit-paste"

[rule_battery]
appname = "Battery"
new_icon = "battery-caution"

[rule_screenshot]
appname = "Screenshot saved"
new_icon = "applets-screenshooter"

[rule_dunst]
appname = "Dunst"
new_icon = "preferences-system-notifications"
