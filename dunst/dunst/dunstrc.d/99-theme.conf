[global]
background = "#292E42"
foreground = "#C0CAF5"
frame_color = "#7DCFFF"
separator_color = "frame"
corner_radius = 10
frame_width = 2
offset = 12x12
gap_size = 8
transparency = 0

format = "<b>%s</b>\n<span size='smaller'>%a</span>\n%b"

icon_position = left
min_icon_size = 32
max_icon_size = 48
text_icon_padding = 10
icon_theme = "Papirus,Adwaita"
enable_recursive_icon_lookup = true
default_icon = "dialog-information"

[urgency_low]
background = "#24283B"
foreground = "#A9B1D6"
frame_color = "#3B4261"
highlight = "#7DCFFF"

[urgency_normal]
background = "#292E42"
foreground = "#C0CAF5"
frame_color = "#FF9E64"
highlight = "#FF9E64"

[urgency_critical]
background = "#1F2335"
foreground = "#C0CAF5"
frame_color = "#F7768E"
highlight = "#F7768E"

[rule_firefox]
desktop_entry = "firefox"
new_icon = "firefox"

[rule_clipboard]
appname = "Clipboard"
new_icon = "edit-paste"

[rule_battery]
appname = "Battery"
new_icon = "battery-caution"

[rule_screenshot]
appname = "Screenshot saved"
new_icon = "applets-screenshooter"

[rule_dunst]
appname = "Dunst"
new_icon = "preferences-system-notifications"
