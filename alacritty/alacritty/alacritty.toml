[window]
dimensions = { columns = 120, lines = 32 }
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.80

[scrolling]
history = 10000

[font]
normal = { family = "FiraCode Nerd Font Mono", style = "Regular" }
size = 11.0

[cursor]
style = { shape = "Block", blinking = "Never" }
vi_mode_style = { shape = "Block", blinking = "Never" }

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[colors]
transparent_background_colors = false
draw_bold_text_with_bright_colors = false

[colors.primary]
background = "#2e3440"
foreground = "#d8dee9"
dim_foreground = "#a5abb6"

[colors.cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.vi_mode_cursor]
text = "#2e3440"
cursor = "#d8dee9"

[colors.selection]
text = "CellForeground"
background = "#4c566a"

[colors.search]
matches = { foreground = "CellBackground", background = "#88c0d0" }
focused_match = { foreground = "CellBackground", background = "#88c0d0" }

[colors.footer_bar]
background = "#434c5e"
foreground = "#d8dee9"

[colors.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[colors.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"

[colors.dim]
black = "#373e4d"
red = "#94545d"
