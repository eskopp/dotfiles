[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 }
decorations = "Full"
opacity = 0.95

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font", style = "Bold Italic" }
size = 11.0

[cursor]
style = { shape = "Block", blinking = "Off" }

[colors.primary]
background = "#2e3440"
foreground = "#eceff4"

[colors.cursor]
text = "#2e3440"
cursor = "#88c0d0"

[colors.selection]
text = "#eceff4"
background = "#4c566a"

[colors.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[colors.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"
