workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - test

bash_syntax_check:
  stage: test
  image: bash:latest
  script:
    - bash -n bootstrap.sh install.sh uninstall.sh
    - bash -n scripts/*.sh install/*.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
