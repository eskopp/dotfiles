"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[app]
overall = { bg = "#2E3440" }

[mgr]
cwd            = { fg = "#88C0D0", bold = true }
find_keyword   = { fg = "#EBCB8B", bold = true, underline = true }
find_position  = { fg = "#B48EAD", bold = true }
symlink_target = { fg = "#81A1C1", italic = true }

marker_copied   = { fg = "#A3BE8C", bg = "#A3BE8C" }
marker_cut      = { fg = "#BF616A", bg = "#BF616A" }
marker_marked   = { fg = "#88C0D0", bg = "#88C0D0" }
marker_selected = { fg = "#EBCB8B", bg = "#EBCB8B" }
marker_symbol   = "|"

count_copied   = { fg = "#2E3440", bg = "#A3BE8C" }
count_cut      = { fg = "#ECEFF4", bg = "#BF616A" }
count_selected = { fg = "#2E3440", bg = "#EBCB8B" }

border_symbol = "|"
border_style  = { fg = "#4C566A" }

[indicator]
parent  = { fg = "#4C566A" }
current = { fg = "#88C0D0" }
preview = { fg = "#81A1C1" }
padding = { open = "", close = "" }

[tabs]
active    = { fg = "#2E3440", bg = "#88C0D0", bold = true }
inactive  = { fg = "#D8DEE9", bg = "#3B4252" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#2E3440", bg = "#88C0D0", bold = true }
normal_alt  = { fg = "#D8DEE9", bg = "#3B4252" }

select_main = { fg = "#2E3440", bg = "#A3BE8C", bold = true }
select_alt  = { fg = "#D8DEE9", bg = "#3B4252" }

unset_main = { fg = "#ECEFF4", bg = "#BF616A", bold = true }
unset_alt  = { fg = "#D8DEE9", bg = "#3B4252" }

[status]
overall         = { bg = "#3B4252" }
sep_left        = { open = "", close = "" }
sep_right       = { open = "", close = "" }
perm_type       = { fg = "#81A1C1" }
perm_read       = { fg = "#A3BE8C" }
perm_write      = { fg = "#EBCB8B" }
perm_exec       = { fg = "#BF616A" }
perm_sep        = { fg = "#4C566A" }
progress_label  = { fg = "#ECEFF4", bold = true }
progress_normal = { fg = "#88C0D0", bg = "#434C5E" }
progress_error  = { fg = "#BF616A", bg = "#434C5E" }

[which]
cols            = 3
mask            = { bg = "#2E3440" }
cand            = { fg = "#88C0D0", bold = true }
rest            = { fg = "#D8DEE9" }
desc            = { fg = "#81A1C1" }
separator       = "  "
separator_style = { fg = "#4C566A" }

[confirm]
border     = { fg = "#4C566A" }
title      = { fg = "#88C0D0", bold = true }
body       = { fg = "#D8DEE9" }
list       = { fg = "#81A1C1" }
btn_yes    = { fg = "#2E3440", bg = "#A3BE8C", bold = true }
btn_no     = { fg = "#ECEFF4", bg = "#BF616A", bold = true }
btn_labels = ["Yes", "No"]

[spot]
border   = { fg = "#4C566A" }
title    = { fg = "#88C0D0", bold = true }
tbl_col  = { bg = "#3B4252" }
tbl_cell = { fg = "#ECEFF4", bg = "#434C5E" }

[notify]
title_info  = { fg = "#88C0D0" }
title_warn  = { fg = "#EBCB8B" }
title_error = { fg = "#BF616A", bold = true }

[pick]
border   = { fg = "#4C566A" }
active   = { fg = "#2E3440", bg = "#88C0D0", bold = true }
inactive = { fg = "#D8DEE9" }

[input]
border   = { fg = "#4C566A" }
title    = { fg = "#88C0D0", bold = true }
value    = { fg = "#ECEFF4" }
selected = { fg = "#2E3440", bg = "#81A1C1", bold = true }

[cmp]
border       = { fg = "#4C566A" }
active       = { fg = "#2E3440", bg = "#88C0D0", bold = true }
inactive     = { fg = "#D8DEE9" }
icon_file    = "f"
icon_folder  = "d"
icon_command = ">"

[tasks]
border  = { fg = "#4C566A" }
title   = { fg = "#88C0D0", bold = true }
hovered = { fg = "#2E3440", bg = "#81A1C1", bold = true }

[help]
on      = { fg = "#88C0D0", bold = true }
run     = { fg = "#A3BE8C" }
desc    = { fg = "#D8DEE9" }
hovered = { bg = "#3B4252" }
footer  = { fg = "#4C566A", italic = true }

[filetype]
rules = [
  { mime = "image/*",         fg = "#EBCB8B" },
  { mime = "{audio,video}/*", fg = "#B48EAD" },
  { mime = "application/*",   fg = "#81A1C1" },
  { mime = "inode/empty",     fg = "#4C566A" },
  { url = "*/",               fg = "#88C0D0", bold = true },
  { url = "*", is = "orphan", fg = "#BF616A" },
]
