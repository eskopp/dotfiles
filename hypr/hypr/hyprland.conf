# --------------------------------------------------
# Generic monitor fallback
# Uses the preferred resolution/refresh rate, places
# the monitor automatically, and applies scale 1.
# Useful as a default rule for unknown/new displays.
# Disabled for now to avoid wrong monitor placement.
# --------------------------------------------------
# monitor = , preferred, auto, 1

# --------------------------------------------------
# Environment variables
# These ensure common applications use native Wayland
# support instead of falling back to XWayland.
# --------------------------------------------------
env = XCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

# --------------------------------------------------
# User-defined variables
# Makes the config easier to read and maintain.
# --------------------------------------------------
$mainMod = SUPER
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox

# --------------------------------------------------
# Startup applications and services
# These commands are executed once when Hyprland starts.
# --------------------------------------------------

# Export important session variables to systemd/dbus-aware applications
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Wallpaper startup script
# This starts hyprpaper and then applies a random wallpaper.
exec-once = ~/.local/bin/hyprpaper-start

# PolicyKit authentication agent
exec-once = /usr/lib/hyprpolkitagent

# Network manager tray applet

# Status bar
exec-once = waybar

# Notification daemon
exec-once = dunst

# Clipboard history daemon
exec-once = ~/.local/bin/clipboard-daemon

# --------------------------------------------------
# Monitor configuration
# Format:
# monitor = name, resolution@refresh, position, scale
# --------------------------------------------------

# Built-in laptop display
# Kept at position 0x0 as the anchor display
monitor = eDP-1, 2880x1800@60, 0x0, 1.5

# External monitor
# Placed to the left of the laptop display
# 1920 / 1.5 = 1280 logical width, so use -1280x0
monitor = HDMI-A-1, 1920x1080@60, -1280x0, 1.5

source = ~/.config/theme-switcher/current/hyprland-colors.conf

# --------------------------------------------------
# General layout and window behavior
# --------------------------------------------------
general {
    # Inner gaps between tiled windows
    gaps_in = 1

    # Outer gaps between windows and screen edges
    gaps_out = 1

    # Window border thickness
    border_size = 1

    # Border color of the active window
    col.active_border = $active_border

    # Border color of inactive windows
    col.inactive_border = $inactive_border

    # Default tiling layout
    layout = dwindle

    # Allow resizing windows by dragging borders
    resize_on_border = true
}

# --------------------------------------------------
# Window decoration settings
# --------------------------------------------------
decoration {
    # Rounded window corners
    rounding = 6

    blur {
        # Enable blur effects
        enabled = true

        # Blur strength/size
        size = 6

        # Number of blur passes
        passes = 2
    }

    shadow {
        # Enable window shadows
        enabled = false

        # Shadow size/range
        range = 16

        # Shadow rendering intensity
        render_power = 3
    }
}

# --------------------------------------------------
# Animation settings
# --------------------------------------------------
animations {
    # Enable animations globally
    enabled = true

    # Custom easing curve
    bezier = ease, 0.22, 1.0, 0.36, 1.0

    # Window open/move animation
    animation = windows, 1, 5, ease

    # Window close animation
    animation = windowsOut, 1, 5, ease, popin 80%

    # Border transition animation
    animation = border, 1, 6, ease

    # Fade animation
    animation = fade, 1, 5, ease

    # Workspace switching animation
    animation = workspaces, 1, 6, ease
}

# --------------------------------------------------
# Input configuration
# --------------------------------------------------
input {
    # German keyboard layout
    kb_layout = de

    # Focus follows mouse movement
    follow_mouse = 1

    touchpad {
        # Natural scrolling for touchpad gestures
        natural_scroll = true
    }

    # Mouse sensitivity (0 = default)
    sensitivity = 0

    # Natural scrolling for other pointing devices if supported
    natural_scroll = true
}

# --------------------------------------------------
# Miscellaneous settings
# --------------------------------------------------
misc {
    # Disable Hyprland startup logo
    disable_hyprland_logo = false

    # Disable default wallpaper
    force_default_wallpaper = 0

    # Disable Splash rendering
    disable_splash_rendering = true
}

# --------------------------------------------------
# Main application keybindings
# --------------------------------------------------

# Open terminal
bind = $mainMod, RETURN, exec, $terminal

# Open application launcher
bind = $mainMod, D, exec, $menu

# Open file manager
bind = $mainMod, E, exec, $fileManager

# Change wallpaper
bind = $mainMod, W, exec, ~/.local/bin/random-wallpaper

# Open theme switcher
bind = $mainMod, code:28, exec, ~/.local/bin/theme-switcher

# Open theme switcher

# Open theme switcher

# Open web browser
bind = $mainMod, B, exec, $browser

# Open NeoVim in terminal
bind = $mainMod, N, exec, $terminal -e nvim

# Close active window
bind = $mainMod, Q, killactive,

# Exit Hyprland session
bind = $mainMod SHIFT, M, exit,

# Toggle fullscreen for active window
bind = $mainMod, F, fullscreen, 0

# Toggle floating mode for active window
bind = $mainMod, V, togglefloating,

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Take region screenshot

# Open power menu
bind = $mainMod, ESCAPE, exec, ~/.local/bin/power-menu

# Open clipboard history menu
bind = $mainMod, C, exec, ~/.local/bin/clipboard-menu

# Open Bluetooth device menu
bind = $mainMod SHIFT, B, exec, ~/.local/bin/bluetooth-menu

# Reload Hyprland configuration
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Toggle split orientation in dwindle layout
bind = $mainMod, J, togglesplit,

# --------------------------------------------------
# Focus movement between windows
# --------------------------------------------------
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

# --------------------------------------------------
# Move windows within the layout
# --------------------------------------------------
bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

# --------------------------------------------------
# Workspace switching
# --------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --------------------------------------------------
# Move active window to workspace
# --------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --------------------------------------------------
# Scroll through workspaces with mouse wheel
# while holding the main modifier key
# --------------------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --------------------------------------------------
# Mouse bindings for moving/resizing floating windows
# --------------------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --------------------------------------------------
# Media and brightness keys
# --------------------------------------------------

# Raise audio volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Lower audio volume
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Toggle audio mute
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Increase screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%

# Decrease screen brightness
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --------------------------------------------------
# Additional workspace and monitor bindings
# --------------------------------------------------
workspace = 1, monitor:eDP-1, default:true, persistent:true
workspace = 2, monitor:HDMI-A-1, default:true, persistent:true

bind = $mainMod CTRL, LEFT, focusmonitor, l
bind = $mainMod CTRL, RIGHT, focusmonitor, r
bind = $mainMod CTRL SHIFT, LEFT, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, RIGHT, movecurrentworkspacetomonitor, r

# --------------------------------------------------
# Screenshot keybindings
# --------------------------------------------------

# --------------------------------------------------
# Screenshot keybindings
# SUPER + COMMA  = select area
# SUPER + PERIOD = active window
# SUPER + MINUS  = full screen
# --------------------------------------------------
bind = $mainMod, COMMA, exec, ~/.local/bin/polarshot area
bind = $mainMod, PERIOD, exec, ~/.local/bin/polarshot active
bind = $mainMod, MINUS, exec, ~/.local/bin/polarshot full

