background {
    monitor =
    path = /home/erik/.config/hypr/lockscreen.png
    blur_passes = 2
    blur_size = 7
}

general {
    hide_cursor = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(192,202,245,1.0)
    font_size = 96
    font_family = Fira Sans
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = rgba(255,158,100,1.0)
    inner_color = rgba(36,40,59,0.85)
    font_color = rgba(192,202,245,1.0)
    fade_on_empty = false
    placeholder_text = Password...
    hide_input = false
    rounding = 12
    position = 0, -40
    halign = center
    valign = center
}
