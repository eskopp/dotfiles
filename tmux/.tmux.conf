set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g prefix C-b
unbind C-a
bind C-b send-prefix

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 24
set -g status-right-length 40

set -g status-style "bg=#24283B,fg=#C0CAF5"
set -g message-style "bg=#292E42,fg=#C0CAF5"
set -g message-command-style "bg=#292E42,fg=#C0CAF5"
set -g mode-style "bg=#3B4261,fg=#C0CAF5"

set -g pane-border-style "fg=#292E42"
set -g pane-active-border-style "fg=#7DCFFF"

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#565F89,bg=#24283B]  #I:#W  "
setw -g window-status-current-format "#[fg=#C0CAF5,bg=#292E42,bold]  #I:#W  "
setw -g window-status-activity-style "fg=#E0AF68,bg=#24283B"
setw -g window-status-bell-style "fg=#F7768E,bg=#24283B,bold"

set -g status-left "#[fg=#FF9E64,bg=#24283B,bold] #S "
set -g status-right "#[fg=#565F89,bg=#24283B]#H  #[fg=#C0CAF5,bg=#24283B]%H:%M "

set -g display-panes-colour "#7AA2F7"
set -g display-panes-active-colour "#FF9E64"

unbind '"'
unbind %
unbind Left
unbind Right
unbind Up
unbind Down
unbind C-Left
unbind C-Right
unbind C-Up
unbind C-Down

bind s split-window -v
bind v split-window -h

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
