set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 24
set -g status-right-length 40

set -g status-style "bg=#2E3440,fg=#D8DEE9"
set -g message-style "bg=#3B4252,fg=#ECEFF4"
set -g message-command-style "bg=#3B4252,fg=#ECEFF4"
set -g mode-style "bg=#434C5E,fg=#ECEFF4"

set -g pane-border-style "fg=#3B4252"
set -g pane-active-border-style "fg=#88C0D0"

setw -g window-status-separator ""
setw -g window-status-format "#[fg=#4C566A,bg=#2E3440]  #I:#W  "
setw -g window-status-current-format "#[fg=#ECEFF4,bg=#3B4252,bold]  #I:#W  "
setw -g window-status-activity-style "fg=#EBCB8B,bg=#2E3440"
setw -g window-status-bell-style "fg=#BF616A,bg=#2E3440,bold"

set -g status-left "#[fg=#88C0D0,bg=#2E3440,bold] #S "
set -g status-right "#[fg=#4C566A,bg=#2E3440]#H  #[fg=#D8DEE9,bg=#2E3440]%H:%M "

set -g display-panes-colour "#81A1C1"
set -g display-panes-active-colour "#88C0D0"

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
