monitor=,preferred,auto,1

env = XCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

$mainMod = SUPER
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = waybar
exec-once = dunst
exec-once = ~/.local/bin/hyprpaper-start
exec-once = ~/.local/bin/clipboard-daemon

# Laptop Display (bleibt der Ankerpunkt bei 0,0)
monitor = eDP-1, 2880x1800@60, 0x0, 1.6


# Externer Monitor (wird links daneben geschoben)
monitor = HDMI-A-1, 1920x1080@60, -1920x0, 1

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(4c566a99)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 2
    }
    shadow {
        enabled = true
        range = 16
        render_power = 3
    }
}

animations {
    enabled = true
    bezier = ease, 0.22, 1.0, 0.36, 1.0
    animation = windows, 1, 5, ease
    animation = windowsOut, 1, 5, ease, popin 80%
    animation = border, 1, 6, ease
    animation = fade, 1, 5, ease
    animation = workspaces, 1, 6, ease
}

input {
    kb_layout = de
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
    natural_scroll = true
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, U, exec, hyprlock
bind = $mainMod SHIFT, S, exec, ~/.local/bin/screenshot-region
bind = $mainMod, ESCAPE, exec, ~/.local/bin/power-menu
bind = $mainMod, C, exec, ~/.local/bin/clipboard-menu

bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-



# Fenster nach links/rechts auf den nächsten Monitor verschieben
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r

source = ~/.config/hypr/conf.d/screenshots.conf