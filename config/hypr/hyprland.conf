# --------------------------------------------------
# Generic monitor fallback
# Uses the preferred resolution/refresh rate, places
# the monitor automatically, and applies scale 1.
# Useful as a default rule for unknown/new displays.
# --------------------------------------------------
monitor = , preferred, auto, 1

# --------------------------------------------------
# Environment variables
# These ensure common applications use native Wayland
# support instead of falling back to XWayland.
# --------------------------------------------------
env = XCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

# --------------------------------------------------
# User-defined variables
# Makes the config easier to read and maintain.
# --------------------------------------------------
$mainMod = SUPER
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun
$browser = firefox

# --------------------------------------------------
# Startup applications and services
# These commands are executed once when Hyprland starts.
# --------------------------------------------------

# Export important session variables to systemd/dbus-aware applications
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.local/bin/random-wallpaper
# PolicyKit authentication agent
exec-once = /usr/lib/hyprpolkitagent

# Network manager tray applet
exec-once = nm-applet --indicator

# Status bar
exec-once = waybar

# Notification daemon
exec-once = dunst

# Wallpaper startup script
# exec-once = hyprpaper

# Clipboard history daemon
exec-once = ~/.local/bin/clipboard-daemon

# --------------------------------------------------
# Monitor configuration
# Format:
# monitor = name, resolution@refresh, position, scale
# --------------------------------------------------

# Built-in laptop display
# Kept at position 0x0 as the anchor display
monitor = eDP-1, 2880x1800@60, 0x0, 1.6

# External monitor
# Placed to the left of the laptop display
monitor = HDMI-A-1, 1920x1080@60, -1920x0, 1

# --------------------------------------------------
# General layout and window behavior
# --------------------------------------------------
general {
    # Inner gaps between tiled windows
    gaps_in = 1

    # Outer gaps between windows and screen edges
    gaps_out = 1

    # Window border thickness
    border_size = 1

    # Border color of the active window
    col.active_border = rgba(88c0d0ff)

    # Border color of inactive windows
    col.inactive_border = rgba(4c566a99)

    # Default tiling layout
    layout = dwindle

    # Allow resizing windows by dragging borders
    resize_on_border = true
}

# --------------------------------------------------
# Window decoration settings
# --------------------------------------------------
decoration {
    # Rounded window corners
    rounding = 6

    blur {
        # Enable blur effects
        enabled = true

        # Blur strength/size
        size = 6

        # Number of blur passes
        passes = 2
    }

    shadow {
        # Enable window shadows
        enabled = false

        # Shadow size/range
        range = 16

        # Shadow rendering intensity
        render_power = 3
    }
}

# --------------------------------------------------
# Animation settings
# --------------------------------------------------
animations {
    # Enable animations globally
    enabled = true

    # Custom easing curve
    bezier = ease, 0.22, 1.0, 0.36, 1.0

    # Window open/move animation
    animation = windows, 1, 5, ease

    # Window close animation
    animation = windowsOut, 1, 5, ease, popin 80%

    # Border transition animation
    animation = border, 1, 6, ease

    # Fade animation
    animation = fade, 1, 5, ease

    # Workspace switching animation
    animation = workspaces, 1, 6, ease
}

# --------------------------------------------------
# Input configuration
# --------------------------------------------------
input {
    # German keyboard layout
    kb_layout = de

    # Focus follows mouse movement
    follow_mouse = 1

    touchpad {
        # Natural scrolling for touchpad gestures
        natural_scroll = true
    }

    # Mouse sensitivity (0 = default)
    sensitivity = 0

    # Natural scrolling for other pointing devices if supported
    natural_scroll = true
}

# --------------------------------------------------
# Miscellaneous settings
# --------------------------------------------------
misc {
    # Disable Hyprland startup logo
    disable_hyprland_logo = true

    # Disable default wallpaper
    force_default_wallpaper = 0
}

# --------------------------------------------------
# Main application keybindings
# --------------------------------------------------

# Open terminal
bind = $mainMod, RETURN, exec, $terminal

# Open application launcher
bind = $mainMod, D, exec, $menu

# Open file manager
bind = $mainMod, E, exec, $fileManager

# Open web browser
bind = $mainMod, W, exec, ~/.local/bin/random-wallpaper
bind = $mainMod, B, exec, $browser

# Close active window
bind = $mainMod, Q, killactive,

# Exit Hyprland session
bind = $mainMod SHIFT, M, exit,

# Toggle fullscreen for active window
bind = $mainMod, F, fullscreen, 0

# Toggle floating mode for active window
bind = $mainMod, V, togglefloating,

# Lock screen
bind = $mainMod, U, exec, hyprlock

# Take region screenshot
bind = $mainMod SHIFT, S, exec, ~/.local/bin/screenshot-region

# Open power menu
bind = $mainMod, ESCAPE, exec, ~/.local/bin/power-menu

# Open clipboard history menu
bind = $mainMod, C, exec, ~/.local/bin/clipboard-menu

# --------------------------------------------------
# Focus movement between windows
# --------------------------------------------------
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

# --------------------------------------------------
# Move windows within the layout
# --------------------------------------------------
bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

# --------------------------------------------------
# Workspace switching
# --------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --------------------------------------------------
# Move active window to workspace
# --------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --------------------------------------------------
# Scroll through workspaces with mouse wheel
# while holding the main modifier key
# --------------------------------------------------
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --------------------------------------------------
# Mouse bindings for moving/resizing floating windows
# --------------------------------------------------
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --------------------------------------------------
# Media and brightness keys
# --------------------------------------------------

# Raise audio volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Lower audio volume
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Toggle audio mute
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Increase screen brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%

# Decrease screen brightness
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --------------------------------------------------
# Move windows to the next monitor on the left/right
# --------------------------------------------------
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r

# --------------------------------------------------
# Additional configuration files
# --------------------------------------------------
source = ~/.config/hypr/conf.d/screenshots.conf
