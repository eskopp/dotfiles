# ── Window ────────────────────────────────────────────────────────────────────
initial_window_width  120c
initial_window_height 32c
window_padding_width  10

background_opacity 0.80
dynamic_background_opacity no

# ── Font ──────────────────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0
cursor_stop_blinking_after 0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ─────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select  yes

# ── Colors ────────────────────────────────────────────────────────────────────
# Tokyo Night Storm
background #24283b
foreground #c0caf5
selection_background #3b4261
selection_foreground #c0caf5

# Cursor
cursor      #c0caf5
cursor_text #24283b

# URL color
url_color #7dcfff

# Normal 8 colors
# black    red      green    yellow   blue     magenta  cyan     white
color0  #414868
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright 8 colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_background       #24283b
tab_bar_margin_color     #24283b
active_tab_background    #292e42
active_tab_foreground    #c0caf5
inactive_tab_background  #1f2335
inactive_tab_foreground  #7aa2f7
active_tab_font_style    bold

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
