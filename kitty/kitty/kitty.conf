# ── Window ────────────────────────────────────────────────────────────────────
initial_window_width  120c
initial_window_height 32c
window_padding_width  10

background_opacity 0.80
dynamic_background_opacity no

# ── Font ──────────────────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0
cursor_stop_blinking_after 0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Mouse ─────────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
copy_on_select  yes

# ── Colors ────────────────────────────────────────────────────────────────────
# Nord Polar Night
background #2e3440
foreground #d8dee9
selection_background #4c566a
selection_foreground #d8dee9

# Cursor
cursor      #d8dee9
cursor_text #2e3440

# URL color
url_color #88c0d0

# Normal 8 colors
# black  red      green    yellow   blue     magenta  cyan     white
# Nord1  Nord11   Nord14   Nord12*  Nord10*  Nord15   Nord8    Nord5
# *yellow=Aurora Orange (dark orange), *blue=deeper Frost (from VSCode theme)
color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #d08770
color4  #5e81ac
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0

# Bright 8 colors
# Nord3    Nord11   Nord14   Nord13   Nord9    Nord15   Nord7    Nord6
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #ebcb8b
color12 #81a1c1
color13 #b48ead
color14 #8fbcbb
color15 #eceff4

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_background       #2e3440
tab_bar_margin_color     #2e3440
active_tab_background    #3b4252
active_tab_foreground    #eceff4
inactive_tab_background  #3b4252
inactive_tab_foreground  #81a1c1
active_tab_font_style    bold

# ── Bell ──────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
